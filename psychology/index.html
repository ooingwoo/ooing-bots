<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심리봇 — 소비자 심리 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --text: #e8e6e1; --text2: #888780; --text3: #4a4945;
  --accent: #B46BC4; --accent-bg: rgba(180,107,196,0.1);
  --font: 'Instrument Sans', -apple-system, sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
.app { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }
.header { padding: 20px 24px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { width: 36px; height: 36px; border-radius: 8px; background: var(--accent-bg); border: 0.5px solid rgba(180,107,196,0.25); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: var(--accent); }
.header-title { font-size: 15px; font-weight: 600; }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.lang-toggle { display: flex; gap: 4px; }
.lang-btn { font-size: 11px; font-weight: 500; font-family: var(--font); padding: 4px 10px; border-radius: 99px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
.lang-btn.active { background: var(--accent); color: #fff; border-color: transparent; }
.module-bar { padding: 12px 24px; border-bottom: 0.5px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
.mod-btn { font-size: 11px; font-weight: 500; font-family: var(--font); padding: 4px 12px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
.mod-btn:hover { border-color: var(--border2); color: var(--text); }
.mod-btn.active { background: var(--accent-bg); border-color: rgba(180,107,196,0.3); color: var(--accent); }
.chat-wrap { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { display: flex; gap: 10px; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
.msg.bot .msg-avatar { background: var(--accent-bg); color: var(--accent); border: 0.5px solid rgba(180,107,196,0.2); }
.msg.user .msg-avatar { background: var(--bg3); color: var(--text2); border: 0.5px solid var(--border); }
.msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.7; max-width: calc(100% - 44px); }
.msg.bot .msg-bubble { background: var(--bg2); border: 0.5px solid var(--border); color: var(--text); border-radius: 4px 12px 12px 12px; }
.msg.user .msg-bubble { background: var(--accent-bg); border: 0.5px solid rgba(180,107,196,0.2); color: var(--text); border-radius: 12px 4px 12px 12px; }
.msg-bubble strong { color: var(--accent); font-weight: 600; }
.typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
.typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: bounce .8s infinite; }
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
.quick-wrap { padding: 0 24px 12px; display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
.quick-btn { font-size: 11px; font-family: var(--font); font-weight: 500; padding: 5px 12px; border-radius: 99px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
.quick-btn:hover { color: var(--text); border-color: rgba(180,107,196,0.3); }
.input-wrap { padding: 16px 24px 20px; border-top: 0.5px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
.input-box { flex: 1; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: var(--font); font-size: 13px; resize: none; outline: none; min-height: 44px; max-height: 120px; transition: border-color .15s; line-height: 1.5; }
.input-box:focus { border-color: rgba(180,107,196,0.4); }
.input-box::placeholder { color: var(--text3); }
.send-btn { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .15s; }
.send-btn:hover { opacity: 0.85; }
.send-btn svg { width: 16px; height: 16px; fill: #fff; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.chat-wrap::-webkit-scrollbar { width: 4px; }
.chat-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="logo">P</div>
      <div>
        <div class="header-title">심리봇</div>
        <div class="header-sub">AI 소비자 심리 분석 · Powered by Claude</div>
      </div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ko',this)">KO</button>
      <button class="lang-btn" onclick="setLang('en',this)">EN</button>
    </div>
  </div>

  <div class="module-bar">
    <button class="mod-btn active" onclick="setModule('전체',this)">전체</button>
    <button class="mod-btn" onclick="setModule('구매심리',this)">구매심리</button>
    <button class="mod-btn" onclick="setModule('브랜드심리',this)">브랜드심리</button>
    <button class="mod-btn" onclick="setModule('설득전략',this)">설득전략</button>
    <button class="mod-btn" onclick="setModule('가격심리',this)">가격심리</button>
  </div>

  <div class="chat-wrap" id="chat"></div>
  <div class="quick-wrap" id="quickWrap"></div>
  <div class="input-wrap">
    <textarea class="input-box" id="inputBox" placeholder="소비자 심리 분석을 요청하세요..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `당신은 소비자 심리학과 구매 행동 분석 전문 AI입니다. K-뷰티/이커머스 맥락에 특화된 소비자 심리 인사이트를 제공합니다. 한국어와 영어 바이링구얼로 응답합니다.

[핵심 지식 베이스]

## 소비자 구매 심리
- 구매 결정 5단계: 문제 인식 → 정보 탐색 → 대안 평가 → 구매 결정 → 구매 후 행동
- Customer Value 3가지:
  1. Functional Value: 기능/성능/내구성/디자인 기반 가치
  2. Psychological Value: 브랜드 이미지, 자아 일치성, 감정적 연결
  3. Monetary Value: 가격 대비 가치, 비용 효율

## 소비자 행동 패턴
- 준거집단 영향: 또래/커뮤니티가 구매 결정에 미치는 영향 (예: 홀리스터 사례)
- 브랜드 페르소나 이탈: 브랜드 이미지와 자아이미지 불일치 시 이탈
- 정보 탐색 행동: 오프라인 체험 후 온라인 구매 (쇼루밍)
- 사회적 증거: 리뷰, 추천, 인플루언서 영향

## 설득 심리학 (Cialdini 6원칙)
- 상호성: 먼저 주면 받는다
- 희소성: 한정판/마감 효과
- 권위: 전문가/인증 활용
- 일관성: 작은 약속 → 큰 약속
- 호감: 좋아하는 사람에게 산다
- 사회적 증거: 남들도 산다

## 가격 심리학
- 앵커링 효과: 첫 번째 가격이 기준점
- 매력 효과: 중간 가격 옵션 선택 유도
- 9의 법칙: $19.99 vs $20
- 번들링: 묶음 판매로 가치 인식 상승

## 기질 유형별 소비자 분석 (STS 6요인 기질검사 기반)
동물 유형으로 소비자 기질을 분류하여 맞춤 마케팅 전략 수립:

| 동물 | 특성 | 마케팅 접근 |
|---|---|---|
| 사자 | 대담, 두려움↓ | 도전적/프리미엄 메시지, 첫 구매 유도 |
| 리트리버 | 밝음, 집중력↑ | 긍정적 후기/커뮤니티 강조 |
| 얼룩말 | 호기심↑, 집중력↓ | 다양한 제품 체험, 샘플 전략 |
| 거북이 | 조용, 인내심↑, 조심성↑ | 상세 성분/안전성 정보 필수 |
| 고양이 | 호불호 확실, 경계심↑ | 상세 성분 설명, 신뢰 구축 먼저 |
| 코알라 | 순응적, 조심성↑ | 베스트셀러/검증된 제품 추천 |
| 고슴도치 | 섬세, 예민 | 섬세한 성분 설명, 자극 없는 메시지 |

## 남녀 심리 차이 (양재원 교수 연구 기반)
- 여성: 사람 기준으로 구체적 표현 → 구체적 사용 후기/스토리텔링 마케팅 효과적
- 남성: 추상적 표현 선호 → 브랜드 가치/컨셉 중심 메시지 효과적
- 감정 상태와 구매 결정 연관: 부정적 감정 상태(배고픔, 피로)일 때 구매 결정 품질 저하
  → 쇼핑 환경 설계 시 고려 (Bushmen et al., 2014)

## K-뷰티 소비자 특성
- 성분 중시 트렌드 (클린뷰티, 비건)
- SNS 바이럴 구매 패턴
- 글로벌 소비자 (알리바바 B2B 바이어, 아마존 B2C)
- 체험 후 재구매 사이클

[현재 선택 모듈]: {{MODULE}}

[응답 원칙]
- 심리 이론 + 실전 적용 사례 함께 제시
- K-뷰티/이커머스 맥락으로 예시 제공
- 실행 가능한 마케팅 전술로 연결
- 확신도 표시 (100%/80%/60%/40%/20%)
- 근거 없는 수치 금지`;

let messages = [];
let currentLang = 'ko';
let currentModule = '전체';

const quicksKo = ['구매 결정 분석', '동물 기질로 고객 분석', '설득 전략 짜기', '남녀 마케팅 차이', 'K-뷰티 소비자 분석'];
const quicksEn = ['Purchase Decision', 'Customer Type Analysis', 'Persuasion Strategy', 'Gender Marketing', 'K-Beauty Consumer'];

function init() {
  addMessage('bot', `안녕하세요. 저는 **심리봇**입니다.\n\n소비자 구매 심리, 브랜드 인식, 설득 전략을 분석해드립니다.\nK-뷰티/이커머스 소비자 심리에 특화되어 있습니다.\n\n어떤 소비자 행동을 분석해드릴까요?`);
  renderQuicks();
}

function renderQuicks() {
  const wrap = document.getElementById('quickWrap');
  const qs = currentLang === 'ko' ? quicksKo : quicksEn;
  wrap.innerHTML = qs.map(q => `<button class="quick-btn" onclick="sendQuick('${q}')">${q}</button>`).join('');
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuicks();
  document.getElementById('inputBox').placeholder = lang === 'ko' ? '소비자 심리 분석을 요청하세요...' : 'Request consumer psychology analysis...';
}

function setModule(mod, btn) {
  currentModule = mod;
  document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  addMessage('bot', `**${mod}** 모듈로 전환됐습니다.`);
}

function addMessage(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-avatar">${role === 'bot' ? 'P' : 'U'}</div><div class="msg-bubble">${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">P</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function sendQuick(text) { document.getElementById('inputBox').value = text; sendMessage(); }

async function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if(!text) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  addTyping();
  try {
    const system = SYSTEM_PROMPT.replace('{{MODULE}}', currentModule);
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system, messages })
    });
    const data = await response.json();
    const reply = data.content?.[0]?.text || '응답을 가져오지 못했습니다.';
    removeTyping();
    addMessage('bot', reply);
    messages.push({ role: 'assistant', content: reply });
  } catch(err) {
    removeTyping();
    addMessage('bot', '일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }
  document.getElementById('sendBtn').disabled = false;
}

init();
</script>
</body>
</html>
