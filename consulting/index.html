<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulting Bot — AI 경영컨설턴트</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e6e1;
  --text2: #888780;
  --text3: #4a4945;
  --accent: #C4A96B;
  --accent-bg: rgba(196,169,107,0.1);
  --font: 'Instrument Sans', -apple-system, sans-serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

.app { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }

/* HEADER */
.header {
  padding: 20px 24px 16px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--accent-bg); border: 0.5px solid rgba(196,169,107,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600; color: var(--accent);
}
.header-title { font-size: 15px; font-weight: 600; color: var(--text); }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.lang-toggle {
  display: flex; gap: 4px;
}
.lang-btn {
  font-size: 11px; font-weight: 500; font-family: var(--font);
  padding: 4px 10px; border-radius: 99px;
  border: 0.5px solid var(--border2);
  background: transparent; color: var(--text2);
  cursor: pointer; transition: all .15s;
}
.lang-btn.active { background: var(--accent); color: #000; border-color: transparent; }

/* INDUSTRY PILLS */
.industry-bar {
  padding: 12px 24px;
  border-bottom: 0.5px solid var(--border);
  display: flex; gap: 6px; flex-wrap: wrap;
  flex-shrink: 0;
}
.ind-btn {
  font-size: 11px; font-weight: 500; font-family: var(--font);
  padding: 4px 12px; border-radius: 99px;
  border: 0.5px solid var(--border);
  background: transparent; color: var(--text2);
  cursor: pointer; transition: all .15s;
}
.ind-btn:hover { border-color: var(--border2); color: var(--text); }
.ind-btn.active { background: var(--accent-bg); border-color: rgba(196,169,107,0.3); color: var(--accent); }

/* CHAT */
.chat-wrap { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

.msg { display: flex; gap: 10px; max-width: 100%; }
.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
}
.msg.bot .msg-avatar { background: var(--accent-bg); color: var(--accent); border: 0.5px solid rgba(196,169,107,0.2); }
.msg.user .msg-avatar { background: var(--bg3); color: var(--text2); border: 0.5px solid var(--border); }

.msg-bubble {
  padding: 12px 16px; border-radius: 12px;
  font-size: 13px; line-height: 1.7;
  max-width: calc(100% - 44px);
}
.msg.bot .msg-bubble {
  background: var(--bg2); border: 0.5px solid var(--border);
  color: var(--text); border-radius: 4px 12px 12px 12px;
}
.msg.user .msg-bubble {
  background: var(--accent-bg); border: 0.5px solid rgba(196,169,107,0.2);
  color: var(--text); border-radius: 12px 4px 12px 12px;
}

.msg-bubble strong { color: var(--accent); font-weight: 600; }
.msg-bubble ul { padding-left: 16px; margin: 6px 0; }
.msg-bubble li { margin-bottom: 4px; }
.msg-bubble .step-badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 4px;
  background: var(--accent-bg); color: var(--accent);
  margin-bottom: 6px;
}
.msg-bubble table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
.msg-bubble td, .msg-bubble th { padding: 6px 10px; border: 0.5px solid var(--border2); text-align: left; }
.msg-bubble th { color: var(--accent); font-weight: 600; background: var(--accent-bg); }

/* TYPING */
.typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
.typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: bounce .8s infinite; }
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* PHASE INDICATOR */
.phase-bar {
  padding: 8px 24px;
  border-bottom: 0.5px solid var(--border);
  display: flex; gap: 4px; align-items: center;
  flex-shrink: 0;
}
.phase-step {
  font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
  padding: 3px 10px; border-radius: 99px;
  border: 0.5px solid var(--border);
  color: var(--text3); background: transparent;
  transition: all .3s;
}
.phase-step.active { background: var(--accent-bg); border-color: rgba(196,169,107,0.3); color: var(--accent); }
.phase-step.done { color: var(--text3); border-color: var(--border); }
.phase-arrow { font-size: 10px; color: var(--text3); }

/* INPUT */
.input-wrap {
  padding: 16px 24px 20px;
  border-top: 0.5px solid var(--border);
  display: flex; gap: 10px; align-items: flex-end;
  flex-shrink: 0;
}
.input-box {
  flex: 1; background: var(--bg2);
  border: 0.5px solid var(--border2);
  border-radius: 10px; padding: 12px 14px;
  color: var(--text); font-family: var(--font); font-size: 13px;
  resize: none; outline: none;
  min-height: 44px; max-height: 120px;
  transition: border-color .15s;
  line-height: 1.5;
}
.input-box:focus { border-color: rgba(196,169,107,0.4); }
.input-box::placeholder { color: var(--text3); }
.send-btn {
  width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn svg { width: 16px; height: 16px; fill: #000; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* QUICK BUTTONS */
.quick-wrap { padding: 0 24px 12px; display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
.quick-btn {
  font-size: 11px; font-family: var(--font); font-weight: 500;
  padding: 5px 12px; border-radius: 99px;
  border: 0.5px solid var(--border2);
  background: transparent; color: var(--text2);
  cursor: pointer; transition: all .15s;
}
.quick-btn:hover { color: var(--text); border-color: rgba(196,169,107,0.3); }

/* SCROLLBAR */
.chat-wrap::-webkit-scrollbar { width: 4px; }
.chat-wrap::-webkit-scrollbar-track { background: transparent; }
.chat-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo">C</div>
      <div>
        <div class="header-title">Consulting Bot</div>
        <div class="header-sub">AI 경영컨설턴트 · Powered by Claude</div>
      </div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ko',this)">KO</button>
      <button class="lang-btn" onclick="setLang('en',this)">EN</button>
    </div>
  </div>

  <!-- INDUSTRY BAR -->
  <div class="industry-bar">
    <button class="ind-btn" onclick="setIndustry('K-뷰티/수출',this)">K-뷰티/수출</button>
    <button class="ind-btn" onclick="setIndustry('이커머스',this)">이커머스</button>
    <button class="ind-btn" onclick="setIndustry('제조/유통',this)">제조/유통</button>
    <button class="ind-btn" onclick="setIndustry('스타트업',this)">스타트업</button>
    <button class="ind-btn" onclick="setIndustry('서비스업',this)">서비스업</button>
    <button class="ind-btn" onclick="setIndustry('브랜딩/마케팅',this)">브랜딩/마케팅</button>
    <button class="ind-btn" onclick="setIndustry('일반경영',this)">일반경영</button>
  </div>

  <!-- PHASE BAR -->
  <div class="phase-bar">
    <span class="phase-step active" id="phase1">01 예비진단</span>
    <span class="phase-arrow">›</span>
    <span class="phase-step" id="phase2">02 본진단</span>
    <span class="phase-arrow">›</span>
    <span class="phase-step" id="phase3">03 개선/권고</span>
    <span class="phase-arrow">›</span>
    <span class="phase-step" id="phase4">04 사후관리</span>
  </div>

  <!-- CHAT -->
  <div class="chat-wrap" id="chat"></div>

  <!-- QUICK BUTTONS -->
  <div class="quick-wrap" id="quickWrap"></div>

  <!-- INPUT -->
  <div class="input-wrap">
    <textarea class="input-box" id="inputBox" placeholder="메시지를 입력하세요..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `당신은 Min Partners 경영컨설팅 방법론을 기반으로 운영되는 전문 AI 경영컨설턴트입니다. 이름은 컨설팅봇입니다. 한국어와 영어 바이링구얼로 응답합니다. 사용자가 한국어로 질문하면 한국어로, 영어로 질문하면 영어로 응답합니다.

[전문 분야]
업종에 따라 K-뷰티/화장품 수출(알리바바 B2B, 아마존 FBA B2C, 틱톡/인스타 마케팅), 이커머스/온라인 셀러, 제조업/유통, 스타트업/예비창업, 서비스업/프리랜서, 브랜딩/마케팅 에이전시, 일반 경영으로 분기하여 전문 컨설팅을 제공합니다.

[컨설팅 프로세스]
01 예비진단: 컨설팅 테마와 목표 설정, 클라이언트가 정의하는 핵심 이슈 파악, 업체 현황 파악(매출/팀 규모/운영 기간)
02 본진단: 이슈를 6가지로 분류 — 회사 내부 개혁, 마케팅 개선, 서비스 개선, 신제품 출시, 기업 인수합병, 사업계획서 필요
03 개선/권고: QUESTION(핵심 문제 정의) → EXTERNAL(외부 환경 분석) → INTERNAL(내부 역량 분석) → STRATEGY(전략 수립) → IMPLEMENTATION PLAN(실행계획 수립)
04 사후관리: 지도 → 체크 → 보완 → 재점검

[기업체 유형 파악]
1. 문제점을 지니고 있으면서 무엇이 문제인지 모르는 경우
2. 문제점을 알고 있지만 해법을 몰라서 어려움을 겪고 있을 때
3. 문제해결의 방법을 알면서도 추진하지 못하는 경우
4. 해결을 해놓고도 이를 활용하지 못하는 경우

[응답 원칙]
- 근거 없는 숫자나 통계 제시 금지
- 애매한 표현("~일 수도 있어요") 금지
- 실행 불가능한 추상적 조언 금지
- 과잉 친절 AI 어투 금지
- 모든 권고에 근거 명시
- 실행 가능한 Next Action 반드시 제시
- 확신도 레벨 표시: 100%(검증된 사실)/80%(~로 확인됨)/60%(~추정, 추가 확인 권장)/40%(간접 지표 기반)/20%(가설)

[분석 프레임워크]
사업 아이디어 평가: SWOT + TAM/SAM/SOM
경쟁사 분석: Porter's Five Forces
문제 해결: First Principles
의사결정: Inversion(역발상)
수익 모델: Business Model Canvas

[현재 선택된 업종]
{{INDUSTRY}}

응답 형식: 마크다운을 적절히 활용하되, 핵심 내용을 먼저 제시하고 근거와 Next Action으로 마무리합니다.`;

let messages = [];
let currentLang = 'ko';
let currentIndustry = '';
let currentPhase = 1;

const greetingKo = `안녕하세요. 저는 **컨설팅봇**, AI 경영컨설턴트입니다.\n\n귀사의 성장과 문제 해결을 위해 함께하겠습니다.\n\n시작하기 전에 몇 가지 여쭤볼게요.\n\n**1.** 어떤 업종에서 사업을 운영하고 계신가요? (위의 업종 버튼을 눌러주셔도 됩니다)\n**2.** 현재 가장 시급하게 해결하고 싶은 문제가 무엇인가요?`;
const greetingEn = `Hello. I'm **Consulting Bot**, your AI business consultant.\n\nI'm here to help you grow and solve your business challenges.\n\nMay I ask a few questions to get started?\n\n**1.** What industry are you in? (You can also click the industry buttons above)\n**2.** What is the most urgent problem you'd like to solve right now?`;

const quicksKo = ['예비진단 시작', '매출 문제 진단', '마케팅 전략 수립', '사업계획서 작성', '경쟁사 분석'];
const quicksEn = ['Start Diagnosis', 'Revenue Issue', 'Marketing Strategy', 'Business Plan', 'Competitor Analysis'];

function init() {
  const greeting = currentLang === 'ko' ? greetingKo : greetingEn;
  addMessage('bot', greeting);
  renderQuicks();
}

function renderQuicks() {
  const wrap = document.getElementById('quickWrap');
  const qs = currentLang === 'ko' ? quicksKo : quicksEn;
  wrap.innerHTML = qs.map(q => `<button class="quick-btn" onclick="sendQuick('${q}')">${q}</button>`).join('');
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuicks();
  document.getElementById('inputBox').placeholder = lang === 'ko' ? '메시지를 입력하세요...' : 'Type your message...';
}

function setIndustry(ind, btn) {
  currentIndustry = ind;
  document.querySelectorAll('.ind-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const msg = currentLang === 'ko'
    ? `**${ind}** 분야로 설정되었습니다. 해당 업종에 맞춰 컨설팅을 진행하겠습니다.\n\n현재 가장 시급한 문제나 목표를 말씀해주세요.`
    : `Industry set to **${ind}**. I'll tailor my consulting to your sector.\n\nPlease tell me your most urgent issue or goal.`;
  addMessage('bot', msg);
}

function setPhase(n) {
  currentPhase = n;
  for(let i = 1; i <= 4; i++) {
    const el = document.getElementById('phase'+i);
    el.classList.remove('active','done');
    if(i < n) el.classList.add('done');
    else if(i === n) el.classList.add('active');
  }
}

function addMessage(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'bot' ? 'C' : 'U';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${formatText(text)}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">C</div>
    <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>')
    .replace(/^### (.*)/gm, '<div class="step-badge">$1</div>')
    .replace(/^- (.*)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendQuick(text) {
  document.getElementById('inputBox').value = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if(!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  if(text.includes('예비진단') || text.includes('diagnosis') || text.includes('시작')) setPhase(1);
  if(text.includes('본진단') || text.includes('문제') || text.includes('issue')) setPhase(2);
  if(text.includes('전략') || text.includes('strategy') || text.includes('권고')) setPhase(3);
  if(text.includes('사후') || text.includes('follow')) setPhase(4);

  addTyping();

  try {
    const systemPrompt = SYSTEM_PROMPT.replace('{{INDUSTRY}}', currentIndustry || '미설정 (대화 중 파악 예정)');

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: messages
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || '응답을 가져오지 못했습니다.';

    removeTyping();
    addMessage('bot', reply);
    messages.push({ role: 'assistant', content: reply });

  } catch(err) {
    removeTyping();
    addMessage('bot', currentLang === 'ko'
      ? '일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.'
      : 'A temporary error occurred. Please try again shortly.');
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('inputBox').focus();
}

init();
</script>
</body>
</html>
